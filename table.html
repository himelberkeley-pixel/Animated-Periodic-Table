@media (min-width: 700px) {
  :root {

}

*, *:before, *:after { box-sizing: border-box; margin: 0; padding: 0; border: 0; font: inherit; vertical-align: baseline; }

html, body {

  color: var(--fg-1);
  font-family: 'IoskeleyMono', monospace, sans-serif;
  width: 100%; height: 100%;
  overflow: hidden;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  perspective: 800px;
  display: flex;
  flex-direction: column;
}

[data-color="0"]  { --color-1:var(--red-1);      --color-2:var(--red-2);      --color-3:var(--red-3);      --color-4:var(--red-4);      --color-5:var(--red-5); }

/* ── Scene ── */
#scene {
  position: fixed; inset: 0;
  transform-style: preserve-3d;
  width: 100%; height: 100%;
}

#scene-content {
  pointer-events: none;
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  backface-visibility: hidden;
}

/* TABLE layout: 18 cols, each exactly --cw wide → total = 18*cw + 17*gap = 100vw */
#scene-content[data-layout="table"] {
  display: grid;
  grid-template-columns: repeat(18, var(--cw));
  grid-auto-rows: var(--ch);
  gap: var(--gap);
  /* center vertically below the header */
  align-content: center;
  justify-content: center;
  padding-top: var(--header-height);
  padding-bottom: 2.5rem; /* space for credits */
}

/* ── Controls ── */
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  position: fixed;
  z-index: 10;
  top: 0; width: 100%;
  height: var(--header-height);
  padding: 0 var(--padding);
  background: linear-gradient(to bottom, rgba(5,11,20,.9) 70%, transparent);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.controls-group {
  display: flex;
  gap: clamp(3px, 1.5vw, 8px);
  height: calc(var(--header-height) * 0.62);
}

button {
  border: none; cursor: pointer;
  font-family: 'IoskeleyMono', monospace, sans-serif;
  white-space: nowrap;
}

.controls button {
  background-color: var(--bg-4);
  color: var(--fg-1);
  border-radius: var(--input-border-radius);
  height: 100%;
  padding: 0 clamp(0.5rem, 3vw, 0.9rem);
  font-size: clamp(0.6rem, 2.8vw, 0.85rem);
  transition: background .15s;
}
.controls button:hover,
.controls button:active { background-color: var(--bg-5); }
.controls button.is-active { background-color: var(--fg-1); color: var(--bg-3); }

/* ── Credits ── */
.credits {
  text-align: center;
  position: fixed; z-index: 5;
  bottom: 0; width: 100%;
  padding: clamp(0.25rem, 1.5vw, 0.6rem) var(--padding);
  font-size: clamp(0.5rem, 2vw, 0.72rem);
  line-height: 1.5;
  background: linear-gradient(to top, rgba(5,11,20,.85) 60%, transparent);
}
.credits a { color: var(--red-1); text-decoration: none; }

/* ── Element card ── */
.element {
  overflow: hidden;
  pointer-events: auto;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--color-3);
  background-color: var(--color-5);
  color: var(--color-1);
  /* width & height driven by the grid vars set above */
  width: var(--cw);
  height: var(--ch);
  border-radius: clamp(1px, 0.5vw, 4px);
  padding: clamp(1px, 0.4vw, 4px);
  transform-style: preserve-3d;
  z-index: 8;
  cursor: pointer;
  font-family: 'IoskeleyMono', monospace, sans-serif;
  text-transform: uppercase;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

button.element:focus-visible,
button.element:active {
  border: 1px solid var(--color-1);
  background-color: var(--color-4);
  outline: none;
}

/* Expanded card */
.element.is-expanded {
  width: clamp(7rem, 45vw, 13rem) !important;
  height: clamp(7rem, 45vw, 13rem) !important;
  z-index: 100;
  padding: clamp(0.4rem, 2.5vw, 1rem);
  align-items: flex-start;
  overflow: visible;
}

.element-description {
  display: none;
  width: 100%;
  font-size: clamp(0.42rem, 1.5vw, 0.6rem);
  text-transform: none;
  color: var(--color-1);
  margin-top: clamp(0.4rem, 2.5vw, 1.2rem);
  text-align: left;
  line-height: 1.6;
}
.element.is-expanded .element-description { display: block; }

.element-symbol {
  margin-top: -.05rem;
  font-size: clamp(0.55rem, 2.2vw, 1.5rem);
  font-weight: 700;
  line-height: 1;
}
.element.is-expanded .element-symbol {
  font-size: clamp(0.65rem, 2.5vw, 1rem);
  margin-top: 0;
}

.element-title {
  font-size: clamp(0.28rem, 0.9vw, 0.5rem);
  font-weight: 700;
  text-align: center;
  line-height: 1.1;
}
.element.is-expanded .element-title {
  font-size: clamp(0.75rem, 3.5vw, 1.5rem);
  text-align: left;
  margin-top: clamp(0.3rem, 1.5vw, 0.8rem);
}

.element-number {
  font-size: clamp(0.26rem, 0.85vw, 0.5rem);
  text-align: right;
  align-self: flex-end;
  line-height: 1;
}
.element.is-expanded .element-number {
  position: absolute;
  font-size: clamp(0.55rem, 2vw, 1rem);
  top: clamp(0.3rem, 2vw, 1rem);
  right: clamp(0.3rem, 2vw, 1rem);
}

/* Non-table layouts: centre-anchor cards */
#scene-content[data-layout="sphere"] .element,
#scene-content[data-layout="helix"] .element,
#scene-content[data-layout="grid"] .element {
  position: absolute;
  left: 50%; top: 50%;
  margin-left: calc(var(--cw) * -.5);
  margin-top: calc(var(--ch) * -.5);
}

/* Footer */
.sahil-footer { display: inline-block; color: var(--fg-2); }
.sahil-footer a {
  color: var(--sky-1); text-decoration: none;
  font-weight: 700; letter-spacing: 1px;
  transition: color .3s, text-shadow .3s;
}
.sahil-footer a:hover { color: var(--cyan-1); text-shadow: 0 0 10px var(--cyan-1); }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}
</style>
</head>

const [$sceneContent] = utils.$('#scene-content');
const [$template]     = utils.$('#element');

for (let i = 0, l = elements.length / S; i < l; i++) {
  const o = i * S;
  const $el = $template.content.cloneNode(true);
  const $e  = $el.querySelector('.element');
  $e.querySelector('.element-number').textContent   = i + 1;
  $e.querySelector('.element-symbol').textContent   = elements[o + EF.SYMBOL];
  $e.querySelector('.element-title').textContent    = elements[o + EF.NAME];
  $e.dataset.color    = elements[o + EF.COLOR];
  $e.style.gridColumn = elements[o + EF.COLUMN];
  $e.style.gridRow    = elements[o + EF.ROW];
  $e.querySelector('.element-description').innerHTML = [
    `Atomic mass: ${elements[o+EF.ATOMIC_MASS]} u`,
    `Density: ${elements[o+EF.DENSITY]} g/cm³`,
    `Melting: ${elements[o+EF.MELTING_POINT]} °C`,
    `Boiling: ${elements[o+EF.BOILING_POINT]} °C`,
  ].join('<br>');
  $sceneContent.appendChild($el);
}

const cards = utils.$('#scene-content .element');

const elementsLayout = createLayout($sceneContent, {
  properties: ['font-size'],
  duration: 2000,
  ease: 'inOutExpo',
});

const sceneAnimatable = createAnimatable('#scene', { rotateX: 200, rotateY: 200 });
const pointer = { x: 0, y: 0, rotateX: 10, rotateY: 12, rx: 0, ry: 0 };

createTimer({
  onUpdate: () => {
    pointer.rx = utils.lerp(pointer.rx, pointer.rotateX, .012);
    pointer.ry = utils.lerp(pointer.ry, pointer.rotateY, .012);
    sceneAnimatable.rotateX(pointer.y * pointer.rx);
    sceneAnimatable.rotateY(pointer.x * pointer.ry);
  }
});

const getCardSize = () => {
  const gap = 2;
  const cw  = (window.innerWidth - 17 * gap) / 18;
  const ch  = cw * 1.18;
  return { cw, ch };
};

const transformLayout = {
  table: () => {
    pointer.rotateX = 10; pointer.rotateY = 12;
    cards.forEach($el => {
      $el.style.opacity = 1;
      $el.style.transform = $el.classList.contains('is-expanded') ? 'translateZ(30px)' : 'translateZ(6px)';
    });
  },
  sphere: () => {
    const r = Math.min(window.innerWidth, window.innerHeight) * 0.36;
    pointer.rotateX = 40; pointer.rotateY = 360;
    cards.forEach(($el, i) => {
      const oz  = $el.classList.contains('is-expanded') ? 20 : 0;
      const phi = Math.acos(-1 + (2*i) / cards.length);
      const th  = Math.sqrt(cards.length * Math.PI) * phi;
      const sp  = Math.sin(phi);
      const x = r*sp*Math.cos(th), y = r*Math.cos(phi), z = r*sp*Math.sin(th);
      $el.style.transform = `translate3d(${x}px,${y}px,${z}px) rotateY(${Math.atan2(x,z)}rad) rotateX(${-Math.atan2(y,Math.hypot(x,z))}rad) translateZ(${oz}px)`;
    });
  },
  helix: () => {
    pointer.rotateX = 30; pointer.rotateY = 300;
    const r=Math.min(window.innerWidth,window.innerHeight)*0.35, tS=0.16, vS=3;
    const yOff=(cards.length*vS)/2;
    cards.forEach(($el,i)=>{
      const oz=$el.classList.contains('is-expanded')?20:0;
      const th=i*tS+Math.PI, y=-(i*vS)+yOff;
      const x=r*Math.sin(th), z=r*Math.cos(th);
      $el.style.transform=`translate3d(${x}px,${y}px,${z}px) rotateY(${Math.atan2(x,z)}rad) rotateX(${-Math.atan2(y,Math.hypot(x,z)*2)}rad) translateZ(${oz}px)`;
    });
  },
  grid: () => {
    pointer.rotateX=10; pointer.rotateY=60;
    const cG=Math.min(window.innerWidth,window.innerHeight)*0.14;
    const rG=cG*0.7, dG=cG, cols=5, rows=5;
    const pL=cols*rows, layers=Math.ceil(cards.length/pL);
    cards.forEach(($el,i)=>{
      const oz=$el.classList.contains('is-expanded')?20:0;
      const col=i%cols,row=Math.floor(i/cols)%rows,layer=Math.floor(i/pL);
      $el.style.transform=`translate3d(${(col-(cols-1)/2)*cG}px,${((rows-1)/2-row)*rG}px,${oz+((layer-(layers-1)/2)*dG)}px)`;
    });
  },
  random: () => {
    pointer.rotateX=10; pointer.rotateY=12;
    const rng=Math.min(window.innerWidth,window.innerHeight)*0.55;
    utils.set(cards,{x:()=>utils.random(-rng,rng),y:()=>utils.random(-rng,rng),z:()=>utils.random(-rng,rng)});
  },
};

/* ── Pointer / touch tilt ── */
const updatePointer = (cx, cy) => {
  const hw=window.innerWidth*.5, hh=window.innerHeight*.5;
  pointer.x=utils.mapRange(cx-hw,-hw,hw,1,-1);
  pointer.y=utils.mapRange(cy-hh,-hh,hh,-1,1);
};

document.addEventListener('pointermove', e => updatePointer(e.clientX, e.clientY));
document.addEventListener('touchmove', e => {
  if (e.touches.length===1) updatePointer(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

/* ── Button toggles ── */
const toggles = utils.$('.controls button.toggle');

document.addEventListener('click', event => {
  const $toggle = event.target.closest('.controls button.toggle');
  if ($toggle) {
    toggles.forEach(b => b.classList.remove('is-active'));
    $toggle.classList.add('is-active');
    const lt = $toggle.id;
    elementsLayout.update(() => {
      cards.forEach($el => $el.classList.remove('is-expanded'));
      $sceneContent.dataset.layout = lt;
      transformLayout[lt]();
    }, { delay: stagger([0, 750], { from: 'random' }) });
    return;
  }
  const $card = event.target.closest('#scene-content .element');
  const shouldExpand = $card && !$card.classList.contains('is-expanded');
  elementsLayout.update(() => {
    cards.forEach($el => $el.classList.remove('is-expanded'));
    if (shouldExpand) $card.classList.add('is-expanded');
    transformLayout[$sceneContent.dataset.layout]();
  }, { ease: spring({ bounce: .2, duration: 350 }) });
});

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (!cards.some($el => $el.classList.contains('is-expanded'))) return;
  elementsLayout.update(() => {
    cards.forEach($el => $el.classList.remove('is-expanded'));
    transformLayout[$sceneContent.dataset.layout]();
  }, { ease: spring({ bounce: .3, duration: 350 }) });
});

/* ── Intro ── */
transformLayout.random();
utils.set(cards, { opacity: 0 });
elementsLayout.update(() => transformLayout.table(), {
  delay: stagger([0, 750], { from: 'random' })
});
</script>
